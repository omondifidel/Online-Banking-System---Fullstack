<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Moneywise</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='services.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .contact-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
            margin-top: 50px;
            text-align: left;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-family: 'Inter', sans-serif;
            outline: none;
        }
        .form-control:focus {
            border-color: var(--accent-purple);
            background: rgba(255, 255, 255, 0.08);
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-icon {
            width: 50px;
            height: 50px;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid var(--accent-purple);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-glow);
            font-size: 1.2rem;
        }
        textarea.form-control { min-height: 120px; resize: vertical; }
        
        @media (max-width: 768px) {
            .contact-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar glass-panel">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>Moneywise</span>
        </div>
        <ul class="nav-links">
            <li><a href="/Home">Home</a></li>
            <li><a href="{{ url_for('services') }}">Services</a></li>
            <li><a href="{{ url_for('about') }}">About Us</a></li>
            <li><a href="{{ url_for('contact') }}" class="active">Contact</a></li>
        </ul>
        <div class="auth-buttons">
            <a href="/register" class="register-link">register</a>
        </div>
    </nav>

    <main class="services-container">
        <header class="services-header">
            <span class="badge">Support 24/7</span>
            <h1>Get in <span>Touch</span> With Us</h1>
            <p>Have questions about your account or our services? Our team is here to help you 24/7.</p>
        </header>

        <div class="contact-grid">
            <section class="contact-form glass-panel" style="padding: 40px;">
                <form action="#" method="POST">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" class="form-control" placeholder="How can we help?">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea class="form-control" placeholder="Your message here..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 10px; width: 100%;">Send Message</button>
                </form>
            </section>

            <section class="contact-info">
                <div class="info-item glass-panel" style="padding: 20px;">
                    <div class="info-icon"><i class="fas fa-envelope"></i></div>
                    <div>
                        <h4 style="margin: 0;">Email Us</h4>
                        <p style="margin: 5px 0 0; color: var(--text-dim);">support@moneywise.com</p>
                    </div>
                </div>

                <div class="info-item glass-panel" style="padding: 20px;">
                    <div class="info-icon"><i class="fas fa-phone-alt"></i></div>
                    <div>
                        <h4 style="margin: 0;">Call Us</h4>
                        <p style="margin: 5px 0 0; color: var(--text-dim);">+254 7420 199 19</p>
                    </div>
                </div>

                <div class="info-item glass-panel" style="padding: 20px;">
                    <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                    <div>
                        <h4 style="margin: 0;">Nairobi</h4>
                        <p style="margin: 5px 0 0; color: var(--text-dim);">Kenya</p>
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
